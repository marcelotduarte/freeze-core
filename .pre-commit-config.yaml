ci:
    autoupdate_schedule: monthly

repos:

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
  - id: check-added-large-files
  - id: check-case-conflict
  - id: check-merge-conflict
  - id: check-shebang-scripts-are-executable
  - id: check-symlinks
  - id: check-toml
  - id: check-yaml
  - id: end-of-file-fixer
  - id: fix-byte-order-marker
  - id: mixed-line-ending
    args: ["--fix=lf"]
  - id: trailing-whitespace

- repo: https://github.com/abravalheri/validate-pyproject
  rev: v0.24.1
  hooks:
  - id: validate-pyproject
    additional_dependencies:
    - validate-pyproject-schema-store[all]>=2024.11.22

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.11.12
  hooks:
  - id: ruff-check
    args: ["--fix", "--unsafe-fixes"]
  - id: ruff-format

- repo: https://github.com/codespell-project/codespell
  rev: v2.4.1
  hooks:
  - id: codespell
    additional_dependencies:
    - tomli
    args: ["--ignore-words-list=lief,LIEF", "-w", "--skip=*.rtf"]

- repo: https://github.com/pre-commit/mirrors-clang-format
  rev: v20.1.5
  hooks:
  - id: clang-format
    exclude: |
            (?x)^(src/freeze_core/.*/pythoncapi_compat.h)$

- repo: local
  hooks:
  - id: pythoncapi
    name: upgrade pythoncapi
    entry: ci/pythoncapi.sh
    language: system
    files: ^(src/freeze_core/.*/pythoncapi_compat.h|src/freeze_core/.*.c)$

- repo: local
  hooks:
  - id: requirements
    name: requirements
    language: system
    entry: python ci/requirements.py
    files: ^(pyproject.toml|requirements.txt|requirements-dev.txt|
             tests/requirements.txt
            )$
