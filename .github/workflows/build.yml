name: Build wheels

on:
  release:
    types:
      - created
  workflow_call:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  matrix:
    name: Generate matrix of builds
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Extra includes
        id: includes
        run: |
          # Support Python 3.11 to 3.14 on major platforms
          # Support Python 3.11 to 3.14 on lesser-known Linux platforms
          # Support Python 3.11 to 3.14 on Windows ARM64 (win_arm64).
          import json, os
          include = [
              {
                  "os": "ubuntu",
                  "os-version": "latest",
                  "arch": "x86_64",
                  "tag": "cp3{11,12,13,14,14t}-manylinux_x86_64",
              },
              {
                  "os": "windows",
                  "os-version": "latest",
                  "arch": "x86_64",
                  "tag": "cp3{11,12,13,14,14t}-win_amd64",
              },
              {
                  "os": "macos",
                  "os-version": "15",
                  "arch": "universal2",
                  "tag": "cp3{11,12,13,14,14t}-macosx_universal2",
              },
          ]
          if os.environ["EVENT_NAME"] != "pull_request":
            include += [
                {
                    "os": "ubuntu",
                    "os-version": "latest",
                    "arch": "x86_64",
                    "tag": "cp3{11,12,13,14,14t}-musllinux_x86_64",
                },
                {
                    "os": "ubuntu",
                    "os-version": "24.04-arm",
                    "arch": "arm64",
                    "tag": "cp3{11,12,13,14,14t}-manylinux_aarch64",
                },
                {
                    "os": "ubuntu",
                    "os-version": "24.04-arm",
                    "arch": "arm64",
                    "tag": "cp3{11,12,13,14,14t}-musllinux_aarch64",
                },
                {
                    "os": "ubuntu",
                    "os-version": "22.04",
                    "arch": "ppc64le",
                    "tag": "cp3{11,12,13,14,14t}-manylinux_ppc64le",
                },
                {
                    "os": "windows",
                    "os-version": "11-arm",
                    "arch": "arm64",
                    "tag": "cp3{11,12,13,14,14t}-win_arm64",
                },
                {
                    "os": "windows",
                    "os-version": "latest",
                    "arch": "x86_64",
                    "tag": "cp3{11,12,13,14,14t}-win32",
                },
            ]
          with open(os.environ["GITHUB_OUTPUT"], "a+") as f:
            print("data="+json.dumps({"include": include}), file=f)
          print("data="+json.dumps({"include": include}))
        shell: python
        env:
          EVENT_NAME: ${{ github.event_name }}

    outputs:
      data: ${{ steps.includes.outputs.data }}

  build_wheel:
    needs: matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.data) }}
    name: Build [${{ matrix.os }}-${{ matrix.os-version }}-${{ matrix.arch }}](job-${{ strategy.job-index }})
    runs-on: ${{ matrix.os }}-${{ matrix.os-version }}
    defaults:
      run:
        shell: bash
    env:
      UV_NO_PROGRESS: true
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: marcelotduarte/freeze-core
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          activate-environment: true
          cache-dependency-glob: "pyproject.toml"
          enable-cache: false

      - name: Set up QEMU
        if: runner.os == 'Linux' && matrix.arch != 'x86_64' && matrix.arch != 'arm64'
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: ${{ matrix.arch }}

      - name: Bump new dev version
        if: github.event_name != 'release'
        run: ./ci/bump-version.sh build-dev

      - name: Build sdist and wheels
        run: ./ci/build-wheel.sh "${MATRIX_TAG}"
        env:
          MATRIX_TAG: ${{ matrix.tag }}

      - name: Upload the artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: freeze-core-wheel-${{ matrix.os }}-job-${{ strategy.job-index }}
          path: wheelhouse
          compression-level: 0 # no compression
          if-no-files-found: error

  publish:
    if: github.event_name == 'release' && startsWith(github.ref, 'refs/tags')
    name: Publish package to PyPI
    needs: build_wheel
    environment:
      name: pypi
      url: https://pypi.org/p/freeze-core
    permissions:
      id-token: write # MANDATORY: Required for OIDC Trusted Publishing
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: wheelhouse
          pattern: freeze-core-wheel-*
          merge-multiple: true

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: wheelhouse/
          skip-existing: true
          verbose: true
