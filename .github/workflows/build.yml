name: Build wheels

on:
  release:
    types:
      - created
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  matrix:
    name: Generate matrix of builds
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Extra includes
        id: includes
        run: |
          # Support Python 3.10 to 3.14 on major platforms
          # Support Python 3.11 to 3.14 on lesser-known Linux platforms
          # Support Python 3.11 to 3.14 on Windows ARM64 (win_arm64).
          import json, os
          include = [
              {
                  "os": "ubuntu",
                  "os-version": "latest",
                  "arch": "x86_64",
                  "tag": "cp3{10,11,12,13,14,14t}-manylinux_x86_64",
              },
              {
                  "os": "windows",
                  "os-version": "latest",
                  "arch": "x86_64",
                  "tag": "cp3{10,11,12,13,14,14t}-win_amd64",
              },
              {
                  "os": "macos",
                  "os-version": "15",
                  "arch": "universal2",
                  "tag": "cp3{10,11,12,13,14,14t}-macosx_universal2",
              },
          ]
          if "${{ github.event_name }}" != "pull_request":
            include += [
                {
                    "os": "ubuntu",
                    "os-version": "latest",
                    "arch": "x86_64",
                    "tag": "cp3{11,12,13,14,14t}-musllinux_x86_64",
                },
                {
                    "os": "ubuntu",
                    "os-version": "24.04-arm",
                    "arch": "arm64",
                    "tag": "cp3{11,12,13,14,14t}-manylinux_aarch64",
                },
                {
                    "os": "ubuntu",
                    "os-version": "24.04-arm",
                    "arch": "arm64",
                    "tag": "cp3{11,12,13,14,14t}-musllinux_aarch64",
                },
                {
                    "os": "ubuntu",
                    "os-version": "22.04",
                    "arch": "ppc64le",
                    "tag": "cp3{11,12,13,14,14t}-manylinux_ppc64le",
                },
                {
                    "os": "windows",
                    "os-version": "11-arm",
                    "arch": "arm64",
                    "tag": "cp3{11,12,13,14,14t}-win_arm64",
                },
                {
                    "os": "windows",
                    "os-version": "latest",
                    "arch": "x86_64",
                    "tag": "cp3{10,11,12,13,14,14t}-win32",
                },
            ]
          with open(os.environ["GITHUB_OUTPUT"], "a+") as f:
            print("data="+json.dumps({"include": include}), file=f)
          print("data="+json.dumps({"include": include}))
        shell: python

    outputs:
      data: ${{ steps.includes.outputs.data }}

  build_wheel:
    needs: matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.data) }}
    name: Build [${{ matrix.os }}-${{ matrix.os-version }}-${{ matrix.arch }}](job-${{ strategy.job-index }})
    runs-on: ${{ matrix.os }}-${{ matrix.os-version }}
    defaults:
      run:
        shell: bash
    env:
      UV_NO_PROGRESS: true
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: marcelotduarte/freeze-core

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          activate-environment: true
          cache-dependency-glob: "pyproject.toml"
          enable-cache: true

      - name: Set up QEMU
        if: runner.os == 'Linux' && matrix.arch != 'x86_64' && matrix.arch != 'arm64'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: ${{ matrix.arch }}

      - name: Bump new dev version
        if: github.event_name != 'release'
        run: ./ci/bump-version.sh build-dev

      - name: Build sdist and wheels
        run: ./ci/build-wheel.sh "${{ matrix.tag }}"

      - name: Upload the artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: freeze-core-wheel-${{ matrix.os }}-job-${{ strategy.job-index }}
          path: wheelhouse
          compression-level: 0 # no compression
          if-no-files-found: error

  publish:
    if: github.event_name == 'release' && startsWith(github.ref, 'refs/tags')
    name: Publish package to PyPI
    needs: build_wheel
    environment:
      name: pypi
      url: https://pypi.org/p/freeze-core
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: wheelhouse
          pattern: freeze-core-wheel-*
          merge-multiple: true

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: wheelhouse/
          skip-existing: true
          verbose: true
